</div>

<script>
  const canvas = document.getElementById('canvas');
  const svg = document.getElementById('diagram');
  let scale = 0.7, translateX = 0, translateY = 0, isDragging = false, startX, startY;
  function applyTransform() {
    svg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
    svg.style.transformOrigin = 'center center';
  }
  applyTransform();
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    scale = Math.min(Math.max(scale * (e.deltaY > 0 ? 0.9 : 1.1), 0.1), 5);
    applyTransform();
  }, { passive: false });
  canvas.addEventListener('mousedown', (e) => { isDragging = true; startX = e.clientX - translateX; startY = e.clientY - translateY; canvas.classList.add('dragging'); });
  window.addEventListener('mousemove', (e) => { if (!isDragging) return; translateX = e.clientX - startX; translateY = e.clientY - startY; applyTransform(); });
  window.addEventListener('mouseup', () => { isDragging = false; canvas.classList.remove('dragging'); });
  canvas.addEventListener('dblclick', () => { scale = 0.7; translateX = 0; translateY = 0; applyTransform(); });
</script>
</body>
</html>
